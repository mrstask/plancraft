{% extends "base.html" %}
{% block title %}Save {{ project.name }} as Profile{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 py-12 space-y-6">
    <div>
        <a href="/projects/{{ project.id }}" class="text-sm text-gray-500 hover:text-gray-700">← Back to project</a>
        <h1 class="text-3xl font-bold text-gray-900 mt-2">Save Project as Profile</h1>
        <p class="text-gray-500 mt-2">
            This creates a reusable bundle from the current project constitution, tech stack, and a small set of cross-cutting decisions.
        </p>
    </div>

    <form method="POST" action="/projects/{{ project.id }}/save-as-profile" class="bg-white border border-gray-200 rounded-2xl p-5 space-y-4">
        <div>
            <label class="text-xs font-semibold uppercase tracking-wide text-gray-400">Profile name</label>
            <input type="text" name="profile_name" value="{{ suggested_name }}" required class="mt-1 w-full border border-gray-300 rounded-xl px-3 py-2 text-sm">
        </div>
        <div>
            <label class="text-xs font-semibold uppercase tracking-wide text-gray-400">Description</label>
            <textarea name="description" rows="4" class="mt-1 w-full border border-gray-300 rounded-xl px-3 py-2 text-sm">Derived from {{ project.name }}.</textarea>
        </div>
        <label class="flex items-start gap-3 rounded-xl border border-gray-200 px-4 py-3">
            <input type="checkbox" name="strip_project_refs" value="true" checked class="mt-0.5">
            <span class="text-sm text-gray-700">
                Remove lines that explicitly mention <strong>{{ project.name }}</strong> where possible so the profile is easier to reuse elsewhere.
            </span>
        </label>
        <div class="flex justify-end">
            <button type="submit" class="bg-blue-600 text-white rounded-xl px-5 py-2.5 text-sm font-medium hover:bg-blue-700 transition">
                Save profile
            </button>
        </div>
    </form>
</div>
{% endblock %}
