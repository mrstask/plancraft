<div id="feature-architect-panel" class="mb-5 space-y-4">
    <section class="bg-white border border-gray-200 rounded-2xl p-4 space-y-3">
        <div class="flex items-start justify-between gap-4">
            <div>
                <p class="text-xs uppercase tracking-wide text-gray-400 font-semibold">Contracts</p>
                <h3 class="text-sm font-semibold text-gray-800 mt-1">Interface boundaries for {{ feature.title }}</h3>
            </div>
            <p class="text-xs text-gray-400 max-w-xs text-right">Capture a contract for each component that exposes an API, event, CLI, or callable function boundary.</p>
        </div>

        {% if contracts %}
        <div class="space-y-3">
            {% for contract in contracts %}
            <form
                class="rounded-xl border border-gray-200 bg-gray-50 p-3 space-y-2"
                hx-patch="/projects/{{ project_id }}/features/{{ feature.id }}/contracts/{{ contract.id }}"
                hx-target="#feature-architect-panel"
                hx-swap="outerHTML"
            >
                <div class="grid grid-cols-1 md:grid-cols-3 gap-2">
                    <select name="component_id" class="border border-gray-300 rounded-lg px-3 py-2 text-sm">
                        {% for component in components %}
                        <option value="{{ component.id }}" {% if component.id == contract.component_id %}selected{% endif %}>{{ component.name }}</option>
                        {% endfor %}
                    </select>
                    <select name="kind" class="border border-gray-300 rounded-lg px-3 py-2 text-sm">
                        {% for kind in ['rest', 'graphql', 'event', 'function', 'cli'] %}
                        <option value="{{ kind }}" {% if kind == contract.kind %}selected{% endif %}>{{ kind }}</option>
                        {% endfor %}
                    </select>
                    <input name="name" value="{{ contract.name }}" class="border border-gray-300 rounded-lg px-3 py-2 text-sm" placeholder="Contract name">
                </div>
                <textarea name="body_md" rows="8" class="w-full border border-gray-300 rounded-xl px-3 py-2 text-sm font-mono">{{ contract.body_md }}</textarea>
                <button class="px-3 py-1.5 rounded-lg bg-white border border-gray-300 text-xs font-medium text-gray-700 hover:bg-gray-100">
                    Save contract
                </button>
            </form>
            {% endfor %}
        </div>
        {% else %}
        <div class="rounded-xl border border-dashed border-gray-300 px-3 py-4 text-sm text-gray-400">
            No feature-scoped contracts yet.
        </div>
        {% endif %}

        <form
            class="border-t border-gray-100 pt-3 space-y-2"
            hx-post="/projects/{{ project_id }}/features/{{ feature.id }}/contracts"
            hx-target="#feature-architect-panel"
            hx-swap="outerHTML"
        >
            <div class="grid grid-cols-1 md:grid-cols-3 gap-2">
                <select name="component_id" class="border border-gray-300 rounded-lg px-3 py-2 text-sm" required>
                    <option value="">Select component</option>
                    {% for component in components %}
                    <option value="{{ component.id }}">{{ component.name }}</option>
                    {% endfor %}
                </select>
                <select name="kind" class="border border-gray-300 rounded-lg px-3 py-2 text-sm">
                    {% for kind in ['rest', 'graphql', 'event', 'function', 'cli'] %}
                    <option value="{{ kind }}">{{ kind }}</option>
                    {% endfor %}
                </select>
                <input name="name" class="border border-gray-300 rounded-lg px-3 py-2 text-sm" placeholder="New contract name" required>
            </div>
            <textarea name="body_md" rows="8" class="w-full border border-gray-300 rounded-xl px-3 py-2 text-sm font-mono" placeholder="# Contract: CreateOrder (REST)&#10;&#10;- **Kind:** rest&#10;- **Component:** orders-service"></textarea>
            <button class="px-3 py-2 rounded-xl bg-blue-600 text-white text-xs font-medium hover:bg-blue-700">
                Add contract
            </button>
        </form>
    </section>
</div>
